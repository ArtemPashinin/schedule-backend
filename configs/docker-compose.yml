services:
  # BACKEND
  app:
    image: ghcr.io/mai-cosmos/schedule-backend:latest
    container_name: backend
    ports:
      - '3030:3030'
    environment:
      - MAIN_GROUP=-1002316633403
      - ERROR_LOG_CHAT_ID=6366591506
      - PORT=3030
      - DB_CONNECT=mongodb://admin:secret@mongo:27017/users?retryWrites=true&writeConcern=majority&authSource=admin
      - BOT_TOKEN=7627924241:AAG3MfAyguBIzHwe0TFh2xpDOiySh7RKQJ4
    depends_on:
      - mongo
    networks:
      - app-network

  # MongoDB
  mongo:
    image: mongo:latest
    container_name: mongo
    ports:
      - '27017:27017'
    volumes:
      - ./mongo-data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=secret
    networks:
      - app-network

  # Mongo UI
  mongo-express:
    image: mongo-express
    container_name: mongo-express
    restart: always
    ports:
      - '8081:8081'
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=admin
      - ME_CONFIG_MONGODB_ADMINPASSWORD=secret
      - ME_CONFIG_MONGODB_URL=mongodb://admin:secret@mongo:27017/
    networks:
      - app-network

  # WEB
  nextjs:
    image: ghcr.io/mai-cosmos/schedule/schedule:latest
    container_name: web
    ports:
      - '3000:3000'
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
